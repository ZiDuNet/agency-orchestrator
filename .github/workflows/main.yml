# agency-orchestrator 自动编译发布
name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm install --ignore-scripts

      - name: 编译 TypeScript
        run: npm run build

      - name: 准备发布包
        run: |
          mkdir -p _release
          cp -r dist _release/
          cp -r workflows _release/ 2>/dev/null || true
          cp -r agency-agents _release/ 2>/dev/null || true
          cp -r examples _release/ 2>/dev/null || true
          cp -r integrations _release/ 2>/dev/null || true
          cp LICENSE _release/ 2>/dev/null || true
          cp README.md _release/ 2>/dev/null || true
          node -e "
            const p=require('./package.json');
            delete p.devDependencies;
            delete p.scripts;
            require('fs').writeFileSync('_release/package.json', JSON.stringify(p, null, 2));
          "

      - name: 打包
        run: |
          cd _release
          tar -czf ../agency-orchestrator-dist.tar.gz .
          cd ..

      - name: 读取版本号
        id: version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=v${PKG_VER}-build$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi
          echo "pkg_version=${PKG_VER}" >> $GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: agency-orchestrator-dist
          path: _release/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: agency-orchestrator-dist.tar.gz
          body: |
            版本: ${{ steps.version.outputs.pkg_version }}
            commit: ${{ github.sha }}
